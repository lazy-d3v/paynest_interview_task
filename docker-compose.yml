# Deployment Webhook (Dokploy):
# curl -X POST "<YOUR-DOKPLOY-WEBHOOK-URL>" \
#   -H "X-GitHub-Event: push" \
#   -H "Content-Type: application/json" \
#   -d '{"ref": "refs/heads/main"}'

services:
  postgres:
    image: postgres:17-alpine
    container_name: paynest-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-paynest_bidding}
    ports:
      - '${DB_PORT_EXTERNAL:-9002}:5432'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: paynest-api
    ports:
      - '${PORT_EXTERNAL:-9000}:${PORT:-3000}'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT_INTERNAL:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-paynest_bidding}
      DATABASE_URL: ${DATABASE_URL:-postgres://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_DATABASE:-paynest_bidding}}
      DB_SSL: ${DB_SSL:-false}
      PORT: ${PORT:-3000}
      JWT_SECRET: ${JWT_SECRET}
      IMGBB_API_KEY: ${IMGBB_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:9000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:9000/auction}
    container_name: paynest-web
    ports:
      - '${FRONTEND_PORT_EXTERNAL:-9001}:80'
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
