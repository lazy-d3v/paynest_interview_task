version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    pull_policy: always
    container_name: paynest-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-paynest_bidding}
    ports:
      - '9002:5432'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: paynest-api
    ports:
      - '9000:3000'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-paynest_bidding}
      DATABASE_URL: ${DATABASE_URL:-postgres://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_DATABASE:-paynest_bidding}}
      DB_SSL: ${DB_SSL:-false}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:9000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:9000/auction}
    container_name: paynest-web
    ports:
      - '9001:8080'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
